const source = "     1|# Widget / Dashboard DAG Plan for linux-ricing\n     2|\n     3|> For Hermes: Use subagent-driven-development skill to implement this plan task-by-task after user review.\n     4|\n     5|Goal: Replace the current monolithic Step 6 craft path for custom dashboard/widgets with a detailed directed acyclic graph that can segment UI elements from the approved preview, build each widget in isolation, validate visual and functional quality, then safely integrate it onto the live desktop.\n     6|\n     7|Architecture: Keep the existing LangGraph 8-step workflow, but split the Step 6 `craft_node` path into a nested widget pipeline for `widgets:*` elements. The outer workflow still owns user gates, rollback manifests, session state, and final cleanup. The nested pipeline owns widget decomposition, framework selection, sandbox generation, screenshot capture, visual loss scoring, interactive/function tests, and desktop promotion.\n     8|\n     9|Tech stack: Python pipeline modules inside `workflow/widget_pipeline/`, existing `workflow/nodes/craft/` codegen and framework references, Quickshell/QML first for KDE Wayland, EWW fallback only when explicitly required, optional AGS/Fabric adapters later, pytest for deterministic tests, ImageMagick/Pillow/OpenCV/SSIM for image comparison, and subprocess-driven smoke tests for framework syntax/runtime checks.\n    10|\n    11|---\n    12|\n    13|## 0. Why this change is needed\n    14|\n    15|The current Step 6 widget path is too coarse:\n    16|\n    17|- `workflow/nodes/craft/__init__.py::craft_node()` does research \u2192 LLM codegen \u2192 write files \u2192 heuristic score in one pass.\n    18|- `_score_details()` mostly checks required file presence and palette coverage.\n    19|- It does not prove that the widget resembles the approved preview.\n    20|- It does not split a dashboard into independently buildable components.\n    21|- It writes directly into real config directories, then relies on coarse scoring and later cleanup.\n    22|- It cannot easily distinguish \"syntax valid but visually ugly\" from \"actually matches the in-world widget/menu shown in the preview\".\n    23|\n    24|The result: high scores can still produce flat gray boxes, non-functional fake widgets, titlebar windows, or visual drift from the Step 2.5 image / Step 4 plan.\n    25|\n    26|The new pipeline should make widget work resemble a real visual compiler:\n    27|\n    28|1. Identify each UI element promised by the preview/plan.\n    29|2. Extract/crop its target visual contract from the approved image/mockup.\n    30|3. Generate each widget in a sandbox.\n    31|4. Screenshot the generated widget.\n    32|5. Compare generated screenshot against target crop using image metrics and vision checks.\n    33|6. Test buttons/actions/data bindings.\n    34|7. Promote only validated artifacts to the live desktop.\n    35|\n    36|---\n    37|\n    38|## 1. Source signals to preserve\n    39|\n    40|Current code and docs already contain useful anchors:\n    41|\n    42|- `workflow/graph.py`\n    43|  - Current nodes: `audit`, `explore`, `visualize`, `refine`, `plan`, `baseline`, `install`, `craft`, `implement`, `cleanup`, `handoff`.\n    44|  - We should not replace the outer graph unless necessary.\n    45|\n    46|- `workflow/state.py`\n    47|  - Existing visual state:\n    48|    - `visualize_image_url`\n    49|    - `visualize_html_path`\n    50|    - `visual_context`\n    51|    - `plan_html_path`\n    52|  - Existing Step 6 state:\n    53|    - `element_queue`\n    54|    - `impl_log`\n    55|    - `craft_log`\n    56|    - `impl_retry_counts`\n    57|    - `visual_artifacts`\n    58|\n    59|- `workflow/nodes/refine.py`\n    60|  - `_default_widget_element(profile)` currently selects:\n    61|    - Hyprland \u2192 `widgets:quickshell`\n    62|    - KDE Wayland \u2192 `widgets:quickshell`\n    63|    - else \u2192 `widgets:eww`\n    64|  - Keep this policy.\n    65|\n    66|- `workflow/nodes/craft/`\n    67|  - Current agentic codegen path already has framework references, codegen retries, texture asset generation, QML `PanelWindow` checks, and palette/file scoring.\n    68|  - The new pipeline should reuse these pieces rather than throw them away.\n    69|\n    70|- Existing references:\n    71|  - `references/visual-contract-pipeline.md`\n    72|  - `references/quickshell-kde-shell-chrome.md`\n    73|  - `references/quickshell-ornate-tileable-borders.md`\n    74|  - `references/preview-plan-implementation-alignment.md`\n    75|  - `references/workflow-debugging-lessons.md`\n    76|\n    77|External discussion signal from the linked Reddit thread:\n    78|\n    79|- AGS is often recommended as a practical middle ground: JS/TS, decent performance, GTK integration, larger ecosystem than Fabric.\n    80|- EWW has community examples but a custom language, performance concerns, and slower development.\n    81|- Quickshell is promising and Qt/QML-based, with good shell potential, but docs/examples can be sparse and it is newer.\n    82|- Fabric/Ignis appeal to Python users but seem less broadly adopted/documented.\n    83|- Several users caution that replacing Waybar/Rofi/Dunst is only worth it when integration/customization needs justify the complexity.\n    84|\n    85|Implication for this workflow:\n    86|\n    87|- Framework choice must be profile-driven and validation-driven, not popularity-driven.\n    88|- KDE Wayland should still default to Quickshell because Qt/QML and layer-shell behavior match Plasma better.\n    89|- EWW/AGS/Fabric should become adapters behind the same widget pipeline interface, not separate bespoke workflows.\n    90|- The pipeline must avoid overbuilding when a simple bar/launcher is enough.\n    91|\n    92|---\n    93|\n    94|## 2. Proposed nested DAG\n    95|\n    96|The outer LangGraph should treat `widgets:*` as one queue element, but internally dispatch a widget-specific DAG.\n    97|\n    98|```mermaid\n    99|flowchart TD\n   100|    A[Widget Intake] --> B[Preview Source Resolution]\n   101|    B --> C[UI Element Segmentation]\n   102|    C --> D[Element Contract Normalization]\n   103|    D --> E[Framework Selection]\n   104|    E --> F[Sandbox Scaffolding]\n   105|    F --> G[Per-Element Codegen]\n   106|    G --> H[Static Validation]\n   107|    H --> I[Sandbox Runtime Launch]\n   108|    I --> J[Screenshot Capture]\n   109|    J --> K[Visual Loss Scoring]\n   110|    K --> L{Visual pass?}\n   111|    L -- no --> M[Feedback Prompt Construction]\n   112|    M --> G\n   113|    L -- yes --> N[Functional Validation]\n   114|    N --> O{Function pass?}\n   115|    O -- no --> P[Function Feedback Construction]\n   116|    P --> G\n   117|    O -- yes --> Q[Integration Composition]\n   118|    Q --> R[Desktop Promotion]\n   119|    R --> S[Live Desktop Screenshot]\n   120|    S --> T[Final Visual + Interaction Gate]\n   121|    T --> U[Craft Log + Manifest]\n   122|```\n   123|\n   124|Key property: every edge is acyclic inside one attempt. Loops are represented as new attempt records, not graph cycles that mutate the same state invisibly:\n   125|\n   126|- `attempt_001/codegen` \u2192 `attempt_001/validation_failed`\n   127|- `attempt_002/codegen` \u2192 `attempt_002/validation_passed`\n   128|\n   129|This keeps debugging and rollback sane.\n   130|\n   131|---\n   132|\n   133|## 3. DAG nodes in detail\n   134|\n   135|### Node 1: Widget Intake\n   136|\n   137|Objective: Decide whether a queued element should enter the widget pipeline.\n   138|\n   139|Inputs:\n   140|\n   141|- `state.element_queue[0]`\n   142|- `state.design`\n   143|- `state.device_profile`\n   144|- `state.visual_context`\n   145|- `state.plan_html_path`\n   146|- existing `craft_log`\n   147|\n   148|Outputs:\n   149|\n   150|- `WidgetPipelineRequest`\n   151|  - `element`: e.g. `widgets:quickshell`\n   152|  - `framework_hint`: `quickshell`, `eww`, `ags`, `fabric`\n   153|  - `desktop_recipe`: `kde`, `hyprland`, `gnome`, `other`\n   154|  - `session_dir`\n   155|  - `target_surfaces`: list of promised dashboard/widget surfaces\n   156|\n   157|Acceptance criteria:\n   158|\n   159|- Only `widgets:*`, `bar:*`, `launcher:*`, `notifications:*` elements with a widget-shell target enter this path.\n   160|- Non-widget deterministic materializers remain in `implement_node`.\n   161|- EWW fallback is skipped if Quickshell already passed for KDE Wayland, preserving current `_skip_redundant_eww_fallback()` behavior.\n   162|\n   163|Implementation notes:\n   164|\n   165|- Add `workflow/widget_pipeline/models.py` dataclasses/Pydantic models.\n   166|- Add `workflow/nodes/craft/widget_pipeline_adapter.py` to keep `craft_node()` small.\n   167|\n   168|---\n   169|\n   170|### Node 2: Preview Source Resolution\n   171|\n   172|Objective: Collect target images and metadata used for visual comparison.\n   173|\n   174|Inputs:\n   175|\n   176|- `visualize_image_url` or cached local image from Step 2.5\n   177|- `visualize_html_path`\n   178|- `plan_html_path`\n   179|- `visual_context.visual_element_plan`\n   180|- `visual_context.validation_checklist`\n   181|- `design.visual_element_plan`\n   182|- screenshot dimensions / monitor geometry from `device_profile`\n   183|\n   184|Outputs:\n   185|\n   186|- `PreviewSourceBundle`\n   187|  - `hero_image_path`\n   188|  - `plan_screenshot_path`\n   189|  - `target_resolution`\n   190|  - `coordinate_space`: `hero`, `plan`, or `desktop`\n   191|  - `known_palette`\n   192|  - `style_terms`\n   193|\n   194|Acceptance criteria:\n   195|\n   196|- Prefer the approved Step 2.5 hero image as the creative source of truth.\n   197|- Use Step 4 `plan.html` screenshot to resolve UI layout when the plan adds labels/structure around the hero image.\n   198|- Never regenerate paid FAL imagery in this phase.\n   199|- If no usable image exists, degrade to text-only validation and mark visual scoring as `SKIP no-preview-source`, not pass.\n   200|\n   201|Implementation notes:\n   202|\n   203|- Add `workflow/widget_pipeline/preview_sources.py`.\n   204|- Use existing local preview cache when available.\n   205|- Store downloaded/copied images under `<session_dir>/widget_pipeline/sources/`.\n   206|\n   207|---\n   208|\n   209|### Node 3: UI Element Segmentation\n   210|\n   211|Objective: Break the dashboard/panel/widget area into independent build targets.\n   212|\n   213|Inputs:\n   214|\n   215|- `PreviewSourceBundle`\n   216|- `visual_element_plan`\n   217|- plan HTML screenshot\n   218|- optional LLM/vision segmentation prompt\n   219|\n   220|Outputs:\n   221|\n   222|- `WidgetElementContract[]`\n   223|  - `id`: stable slug like `left_quest_panel`, `bottom_resource_bar`, `corner_system_orb`\n   224|  - `role`: `panel`, `launcher`, `status_card`, `notification`, `meter`, `quickslot`, `menu`\n   225|  - `bbox`: x/y/w/h in source coordinate space\n   226|  - `crop_path`\n   227|  - `target_text`: labels expected, if any\n   228|  - `target_actions`: click/hover/toggle actions expected\n   229|  - `visual_traits`: material, border, shape, depth, texture, ornament density\n   230|  - `priority`: `critical`, `normal`, `decorative`\n   231|\n   232|Segmentation strategies, in order:\n   233|\n   234|1. Deterministic extraction from `visual_context.visual_element_plan` if it already names surfaces.\n   235|2. DOM/screenshot assisted extraction from `plan.html` if plan cards or overlays identify surfaces.\n   236|3. Vision-model segmentation prompt: ask for bounding boxes around widget/panel/menu surfaces only.\n   237|4. Manual fallback: one coarse widget surface covering the planned dashboard region.\n   238|\n   239|Acceptance criteria:\n   240|\n   241|- Every promised custom widget/menu/panel in the preview or plan becomes a contract.\n   242|- Avoid segmenting wallpaper-only features as widgets.\n   243|- Avoid segmenting normal app windows unless the plan promises shell chrome around them.\n   244|- Contracts are saved as JSON for review and debugging.\n   245|\n   246|Implementation notes:\n   247|\n   248|- Add `workflow/widget_pipeline/segmentation.py`.\n   249|- Add `workflow/widget_pipeline/prompts/segment_widgets.md`.\n   250|- Add unit tests with fixture visual contexts.\n   251|\n   252|---\n   253|\n   254|### Node 4: Element Contract Normalization\n   255|\n   256|Objective: Convert fuzzy visual descriptions into implementable requirements.\n   257|\n   258|Inputs:\n   259|\n   260|- `WidgetElementContract[]`\n   261|- `design.palette`\n   262|- `design.chrome_strategy`\n   263|- `device_profile`\n   264|\n   265|Outputs:\n   266|\n   267|- Normalized contracts with:\n   268|  - required dimensions / anchors / margins\n   269|  - palette token mapping\n   270|  - required assets such as 9-slice borders or tiled textures\n   271|  - allowed live data sources\n   272|  - functionality requirements\n   273|  - explicit non-goals\n   274|\n   275|Acceptance criteria:\n   276|\n   277|- Distinguish decorative vs functional widgets honestly.\n   278|- Any promised button must have a command target, qdbus target, or be labelled decorative/non-functional before implementation.\n   279|- KDE Wayland shell surfaces must require Quickshell `PanelWindow`, not `FloatingWindow`, unless the element is deliberately a normal app window.\n   280|- Thin ornate RPG borders require texture/border assets, not flat rectangles.\n   281|\n   282|Implementation notes:\n   283|\n   284|- Extend the existing texture asset intent extraction in `workflow/nodes/craft/texture_assets.py` so it can operate per widget contract.\n   285|\n   286|---\n   287|\n   288|### Node 5: Framework Selection\n   289|\n   290|Objective: Select the widget framework adapter for each contract or bundle.\n   291|\n   292|Inputs:\n   293|\n   294|- Normalized contracts\n   295|- `device_profile`\n   296|- installed commands\n   297|- design `implementation_targets`\n   298|- user/framework hints\n   299|\n   300|Decision policy:\n   301|\n   302|- KDE Wayland:\n   303|  - default `quickshell`\n   304|  - require `PanelWindow` for shell chrome\n   305|  - EWW only if explicitly requested or Quickshell unavailable\n   306|- Hyprland:\n   307|  - default `quickshell` for integrated shell surfaces\n   308|  - `ags` may be viable for GTK-like dashboards if explicitly requested\n   309|  - EWW fallback for small static widgets\n   310|- GNOME:\n   311|  - avoid pretending shell-level widgets are safe unless a supported extension path exists\n   312|  - AGS/Fabric may run as app windows but must be labelled honestly\n   313|- X11/unknown:\n   314|  - EWW fallback first because geometry/window behavior is older and simpler\n   315|- Fabric:\n   316|  - optional adapter for Python-heavy workflows, but not default until docs/examples/tests are stronger\n   317|\n   318|Outputs:\n   319|\n   320|- `FrameworkPlan`\n   321|  - `framework`\n   322|  - `adapter_name`\n   323|  - `required_packages`\n   324|  - `config_root`\n   325|  - `runtime_command`\n   326|  - `screenshot_strategy`\n   327|\n   328|Acceptance criteria:\n   329|\n   330|- Framework selection is recorded with reason.\n   331|- The selected adapter must support sandbox launch and screenshot capture, not just file writing.\n   332|- If no adapter can validate runtime output, interrupt with a clear unsupported message instead of writing blind configs.\n   333|\n   334|Implementation notes:\n   335|\n   336|- Add `workflow/widget_pipeline/adapters/base.py`.\n   337|- Add first-class adapter: `workflow/widget_pipeline/adapters/quickshell.py`.\n   338|- Keep EWW adapter second.\n   339|- Add AGS/Fabric stubs that return unsupported until proper validation is implemented.\n   340|\n   341|---\n   342|\n   343|### Node 6: Sandbox Scaffolding\n   344|\n   345|Objective: Build in an isolated session directory before touching live config.\n   346|\n   347|Inputs:\n   348|\n   349|- `FrameworkPlan`\n   350|- normalized contracts\n   351|- texture assets\n   352|\n   353|Outputs:\n   354|\n   355|- `WidgetSandbox`\n   356|  - `root`: `<session_dir>/widget_pipeline/sandboxes/<framework>/<attempt>/`\n   357|  - `config_root`\n   358|  - `asset_root`\n   359|  - `runtime_env`\n   360|  - `launch_command`\n   361|  - `cleanup_command`\n   362|\n   363|Acceptance criteria:\n   364|\n   365|- No direct writes to `~/.config/quickshell`, `~/.config/eww`, `~/.config/ags`, or `~/.config/fabric` during sandbox attempts.\n   366|- Sandbox contains all generated QML/Yuck/SCSS/JS/Python/assets.\n   367|- Runtime commands can point the framework at sandbox config if supported.\n   368|- If a framework cannot run from a custom config root, create a temporary backup/restore wrapper and mark it higher risk.\n   369|\n   370|Quickshell sandbox direction:\n   371|\n   372|- Prefer `quickshell -p <sandbox-root>` or equivalent project/config path if supported by installed version.\n   373|- If unavailable, create a temporary isolated `XDG_CONFIG_HOME` for the subprocess.\n   374|- Never overwrite live `~/.config/quickshell/shell.qml` until promotion.\n   375|\n   376|EWW sandbox direction:\n   377|\n   378|- Use `eww --config <sandbox-root> daemon` and `eww --config <sandbox-root> open <window>`.\n   379|- Close daemon/windows after each attempt.\n   380|\n   381|---\n   382|\n   383|### Node 7: Per-Element Codegen\n   384|\n   385|Objective: Generate framework files for one small contract or coherent bundle.\n   386|\n   387|Inputs:\n   388|\n   389|- normalized contract\n   390|- crop image path\n   391|- framework reference templates\n   392|- texture bundle\n   393|- previous validation feedback, if retry\n   394|\n   395|Outputs:\n   396|\n   397|- generated files in sandbox\n   398|- `generation_manifest.json`\n   399|\n   400|Prompt requirements:\n   401|\n   402|- Include target crop path and visual traits.\n   403|- Include exact dimensions/anchors/margins.\n   404|- Include palette hexes and texture asset paths.\n   405|- Include required commands/actions.\n   406|- Include explicit prohibited patterns:\n   407|  - KDE/Wayland Quickshell: no `FloatingWindow` for shell chrome.\n   408|  - KDE: no `hyprctl` unless WM is Hyprland.\n   409|  - No fake buttons without honest decorative labels.\n   410|  - No flat gray rectangle dashboard when RPG texture/ornament contract exists.\n   411|\n   412|Acceptance criteria:\n   413|\n   414|- Generated output must be structured JSON with file path/content records.\n   415|- File paths must be sandbox-relative and safe.\n   416|- Codegen can retry with visual/function feedback.\n   417|- Codegen remains framework-specific but pipeline state is framework-neutral.\n   418|\n   419|Implementation notes:\n   420|\n   421|- Reuse `workflow/nodes/craft/codegen.py` evaluation logic, but factor reusable parts into `workflow/widget_pipeline/codegen.py`.\n   422|- Keep current texture asset bundle generation, but attach generated assets per element.\n   423|\n   424|---\n   425|\n   426|### Node 8: Static Validation\n   427|\n   428|Objective: Reject obviously broken code before runtime.\n   429|\n   430|Checks by framework:\n   431|\n   432|- Quickshell/QML:\n   433|  - required files exist\n   434|  - no unsafe absolute writes\n   435|  - `PanelWindow` for shell chrome\n   436|  - no `FloatingWindow` for promised shell widgets\n   437|  - no unsupported imports for installed quickshell version, where detectable\n   438|  - `qmllint` if available\n   439|- EWW:\n   440|  - `eww.yuck` and `eww.scss` exist\n   441|  - yuck structure balanced\n   442|  - SCSS/CSS braces balanced\n   443|  - required window names exist\n   444|  - `eww --config <sandbox> validate` if available\n   445|- AGS:\n   446|  - package/build file exists\n   447|  - TypeScript/JS syntax check if toolchain exists\n   448|  - GTK version declared honestly\n   449|- Fabric:\n   450|  - Python import/syntax check\n   451|  - dependency check\n   452|\n   453|Acceptance criteria:\n   454|\n   455|- Static validation emits machine-readable reasons.\n   456|- Failures feed directly into the next codegen attempt.\n   457|- Static pass does not imply visual pass.\n   458|\n   459|---\n   460|\n   461|### Node 9: Sandbox Runtime Launch\n   462|\n   463|Objective: Run the generated widget without polluting the real desktop.\n   464|\n   465|Inputs:\n   466|\n   467|- sandbox\n   468|- framework adapter\n   469|\n   470|Outputs:\n   471|\n   472|- process handle/log\n   473|- readiness status\n   474|- runtime window metadata if detectable\n   475|\n   476|Acceptance criteria:\n   477|\n   478|- Launch timeout is bounded.\n   479|- Runtime logs are captured to `<attempt>/runtime.log`.\n   480|- All launched processes are killed/closed after capture.\n   481|- If launch fails, do not promote.\n   482|\n   483|Potential issue:\n   484|\n   485|- Some shell widgets require a real Wayland compositor/layer-shell. The first implementation can use the current live session as the compositor but sandbox the config path. Later we can add a nested compositor (`cage`, `weston`, or `kwin_wayland` test session) if practical.\n   486|\n   487|---\n   488|\n   489|### Node 10: Screenshot Capture\n   490|\n   491|Objective: Capture the actual rendered widget for comparison.\n   492|\n   493|Inputs:\n   494|\n   495|- runtime handle\n   496|- target bbox/expected screen region\n   497|- desktop/session info\n   498|\n   499|Outputs:\n   500|\n   501|- `rendered_screenshot_path`\n   502|- optional `rendered_crop_path`\n   503|- capture metadata\n   504|\n   505|Capture strategies:\n   506|\n   507|- KDE/Wayland:\n   508|  - use Spectacle CLI / `grim` if available / portal screenshot fallback\n   509|  - crop around expected anchor region\n   510|- Hyprland:\n   511|  - `grim` + `slurp`-free geometry from contract\n   512|- X11:\n   513|  - `import`/ImageMagick or `scrot`\n   514|\n   515|Acceptance criteria:\n   516|\n   517|- Captures must be deterministic enough for comparison.\n   518|- If screenshot permission/tooling fails, mark visual validation as blocked and interrupt instead of claiming success.\n   519|- Store both full screenshot and crop.\n   520|\n   521|Implementation notes:\n   522|\n   523|- Reuse or extend `scripts/capture_helpers.py` and `scripts/capture_constants.py`.\n   524|\n   525|---\n   526|\n   527|### Node 11: Visual Loss Scoring\n   528|\n   529|Objective: Compare generated widget screenshot to target crop and produce actionable feedback.\n   530|\n   531|Inputs:\n   532|\n   533|- target crop\n   534|- rendered crop\n   535|- normalized contract\n   536|- palette\n   537|\n   538|Metrics:\n   539|\n   540|- Geometry score:\n   541|  - bounding-box size ratio\n   542|  - anchor/margin match\n   543|  - silhouette/edge density match\n   544|- Palette score:\n   545|  - dominant color distance in LAB/RGB\n   546|  - required palette token presence\n   547|- Texture/material score:\n   548|  - edge/ornament density\n   549|  - local contrast\n   550|  - tiled/9-slice border presence where required\n   551|- Text/layout score:\n   552|  - OCR/text presence if text is expected\n   553|  - widget section count\n   554|- SSIM/perceptual score:\n   555|  - SSIM on resized grayscale crop\n   556|  - optional CLIP/vision similarity later\n   557|- Vision critique:\n   558|  - optional multimodal LLM asks: \"Does rendered widget match target crop? Name concrete deviations.\"\n   559|\n   560|Outputs:\n   561|\n   562|- `VisualScorecard`\n   563|  - `total`: 0-10\n   564|  - sub-scores\n   565|  - `loss`: normalized 0-1\n   566|  - `pass`: bool\n   567|  - `feedback_for_codegen`\n   568|  - side-by-side comparison image path\n   569|\n   570|Initial pass thresholds:\n   571|\n   572|- Critical widget: `total >= 8` and no hard violations.\n   573|- Normal widget: `total >= 7.5` or user accepted deviation.\n   574|- Decorative widget: `total >= 7` if functionality is not promised at minimum.\n   630|- Critical controls need runtime interaction validation if tooling exists.\n   631|- Decorative widgets must be explicitly labelled in contract/log/handoff.\n   632|\n   633|---\n   634|\n   635|### Node 13: Integration Composition\n   636|\n   637|Objective: Combine per-element widgets into one coherent shell config.\n   638|\n   639|Inputs:\n   640|\n   641|- validated per-element sandboxes\n   642|- framework adapter\n   643|- z-order/anchor rules\n   644|- shared assets\n   645|\n   646|Outputs:\n   647|\n   648|- composed sandbox config\n   649|- integration manifest\n   650|\n   651|Acceptance criteria:\n   652|\n   653|- No overlapping surfaces unless deliberately designed.\n   654|- Shared palette/assets are de-duplicated.\n   655|- Quickshell composition uses consistent imports/components.\n   656|- EWW composition avoids duplicate window IDs.\n   657|- Runtime smoke test passes after composition.\n   658|\n   659|---\n   660|\n   661|### Node 14: Desktop Promotion\n   662|\n   663|Objective: Copy the validated composed config into the live desktop with rollback manifest support.\n   664|\n   665|Inputs:\n   666|\n   667|- composed sandbox\n   668|- framework plan\n   669|- baseline/manifest system\n   670|\n   671|Outputs:\n   672|\n   673|- live files written\n   674|- backup manifest entries\n   675|- launched/reloaded live widget process\n   676|\n   677|Acceptance criteria:\n   678|\n   679|- Back up all overwritten live files first.\n   680|- Write only after visual and function gates pass or user explicitly accepts deviation.\n   681|- Use framework-specific reload/restart command.\n   682|- Do not leave old Quickshell/EWW processes rendering stale widgets.\n   683|\n   684|Promotion targets:\n   685|\n   686|- Quickshell:\n   687|  - `~/.config/quickshell/` or a namespaced subdir if supported\n   688|  - restart quickshell instance safely\n   689|- EWW:\n   690|  - `~/.config/eww/`\n   691|  - `eww daemon`, `eww open <windows>`\n   692|- AGS/Fabric:\n   693|  - unsupported until adapters prove launch/capture/rollback.\n   694|\n   695|---\n   696|\n   697|### Node 15: Live Desktop Screenshot + Final Gate\n   698|\n   699|Objective: Confirm that the live desktop result matches the approved preview/plan after promotion.\n   700|\n   701|Inputs:\n   702|\n   703|- live screenshot\n   704|- plan screenshot / target crops\n   705|- composed config\n   706|\n   707|Outputs:\n   708|\n   709|- final visual scorecard\n   710|- final function smoke result\n   711|- `craft_log` record\n   712|- `visual_artifacts` entries\n   713|\n   714|Acceptance criteria:\n   715|\n   716|- Live screenshot must show widgets in the intended positions.\n   717|- Final visual score must pass or interrupt for user acceptance.\n   718|- Handoff must include:\n   719|  - framework used\n   720|  - each widget surface\n   721|  - functional vs decorative controls\n   722|  - commands/hotkeys\n   723|  - known deviations\n   724|  - rollback paths\n   725|\n   726|---\n   727|\n   728|## 4. Data model sketch\n   729|\n   730|```python\n   731|@dataclass\n   732|class WidgetElementContract:\n   733|    id: str\n   734|    role: str\n   735|    priority: Literal[\"critical\", \"normal\", \"decorative\"]\n   736|    source_image: str\n   737|    bbox: tuple[int, int, int, int]\n   738|    crop_path: str\n   739|    anchor: str\n   740|    dimensions: dict[str, int]\n   741|    visual_traits: list[str]\n   742|    palette_tokens: dict[str, str]\n   743|    text_expectations: list[str]\n   744|    actions: list[WidgetAction]\n   745|    hard_requirements: list[str]\n   746|    non_goals: list[str]\n   747|\n   748|@dataclass\n   749|class WidgetAction:\n   750|    id: str\n   751|    label: str\n   752|    trigger: Literal[\"click\", \"hover\", \"toggle\", \"scroll\"]\n   753|    command: str | None\n   754|    expected_effect: str | None\n   755|    decorative: bool = False\n   756|\n   757|@dataclass\n   758|class WidgetAttemptResult:\n   759|    attempt_id: str\n   760|    contract_id: str\n   761|    framework: str\n   762|    sandbox_root: str\n   763|    generated_files: list[str]\n   764|    target_crop: str\n   765|    rendered_crop: str | None\n   766|    static_score: dict\n   767|    visual_score: dict | None\n   768|    function_score: dict | None\n   769|    pass_status: Literal[\"pass\", \"retry\", \"blocked\", \"accepted_deviation\"]\n   770|    feedback: list[str]\n   771|```\n   772|\n   773|---\n   774|\n   775|## 5. Proposed file layout\n   776|\n   777|```text\n   778|workflow/widget_pipeline/\n   779|  __init__.py\n   780|  models.py\n   781|  pipeline.py\n   782|  preview_sources.py\n   783|  segmentation.py\n   784|  contract_normalizer.py\n   785|  framework_selection.py\n   786|  sandbox.py\n   787|  codegen.py\n   788|  static_validate.py\n   789|  runtime.py\n   790|  screenshot.py\n   791|  visual_score.py\n   792|  function_validate.py\n   793|  compose.py\n   794|  promote.py\n   795|  prompts/\n   796|    segment_widgets.md\n   797|    generate_widget.md\n   798|    visual_feedback.md\n   799|  adapters/\n   800|    __init__.py\n   801|    base.py\n   802|    quickshell.py\n   803|    eww.py\n   804|    ags.py\n   805|    fabric.py\n   806|\n   807|tests/\n   808|  test_widget_pipeline_models.py\n   809|  test_widget_pipeline_segmentation.py\n   810|  test_widget_pipeline_framework_selection.py\n   811|  test_widget_pipeline_visual_score.py\n   812|  test_widget_pipeline_static_validate_quickshell.py\n   813|  test_widget_pipeline_static_validate_eww.py\n   814|  test_widget_pipeline_function_validate.py\n   815|  test_craft_widget_pipeline_adapter.py\n   816|\n   817|references/\n   818|  widget-dashboard-dag.md\n   819|```\n   820|\n   821|---\n   822|\n   823|## 6. Implementation plan: bite-sized tasks\n   824|\n   825|### Task 1: Add the design reference document\n   826|\n   827|Objective: Save this plan as a durable reference for the skill.\n   828|\n rrent KDE Wayland pain point. Quickshell first, EWW second because existing code already supports it. AGS can be third if Hyprland/GTK use cases become important.\n  1266|\n  1267|3. Should segmentation use a paid/LLM vision call?\n  1268|\n  1269|Recommended: only as a fallback. Start with deterministic `visual_element_plan` and plan HTML metadata. Use paid/vision calls only if the approved preview lacks structured element data and the user approves cost.\n  1270|\n  1271|4. Should low visual score auto-regenerate code?\n  1272|\n  1273|Recommended: yes, within a strict retry budget. After budget exhaustion, interrupt with target/rendered comparison and concrete reasons.\n  1274|\n  1275|5. Should the sandbox ever run against the live compositor?\n  1276|\n  1277|Recommended: yes for v1, but sandbox config/files must remain isolated. True nested compositor testing can come later if needed.\n  1278|\n  1279|---\n  1280|\n  1281|## 9. Definition of done\n  1282|\n  1283|This work is done when:\n  1284|\n  1285|- `widgets:quickshell` on KDE Wayland no longer relies only on file/palette scoring.\n  1286|- The workflow can decompose a promised dashboard into named widget contracts.\n  1287|- At least one widget can be generated in a sandbox, rendered, screenshotted, visually scored, function-checked, and promoted.\n  1288|- Low visual/function scores produce actionable retry feedback.\n  1289|- Live desktop promotion is backed up and reversible.\n  1290|- Handoff reports exactly which controls are real, decorative, or accepted deviations.\n  1291|- Existing non-widget Step 6 elements continue to work unchanged.\n  1292|\n  1293|---\n  1294|\n  1295|## 10. Recommended first milestone\n  1296|\n  1297|Milestone 1 should be deliberately narrow:\n  1298|\n  1299|\"KDE Wayland Quickshell visual-validation pipeline for one widget surface.\"\n  1300|\n  1301|Scope:\n  1302|\n  1303|- Quickshell only.\n  1304|- One contract/surface only.\n  1305|- Deterministic segmentation fro
